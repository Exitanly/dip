{% extends 'base.html' %}

{% block title %}Удалить операцию{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4>Подтверждение удаления</h4>
            </div>
            <div class="card-body">
                <p>Вы действительно хотите удалить операцию?</p>
                <p><strong>{{ transaction.date }}</strong> — {{ transaction.category.name }} — {{ transaction.amount }} ₽</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                    <a href="{% url 'transaction_list' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
