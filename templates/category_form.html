{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>{{ title }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Название категории</label>
                        <input type="text" name="name" class="form-control" value="{{ category.name|default:'' }}" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_income" class="form-check-input" id="is_income" {% if category.is_income %}checked{% endif %}>
                        <label class="form-check-label" for="is_income">Это категория дохода</label>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Месячный лимит (₽)</label>
                        <input type="number" name="budget_limit" class="form-control" value="{{ category.budget_limit|default:'' }}" step="0.01">
                        <small class="text-muted">Оставьте пустым, если лимита нет</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'category_list' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
